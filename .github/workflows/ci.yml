name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Race
        run: go test -race ./internal/...
      - name: Build + selftest
        shell: bash
        run: |
          go build -pgo=default.pgo -trimpath -o go-miner-ci .
          ./go-miner-ci --selftest
